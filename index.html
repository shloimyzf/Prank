    <!-- Interactive JS System -->
    <script>
        // DOM Elements
        const triggerBtn = document.getElementById('trigger-btn');
        const scanCard = document.getElementById('scan-card');
        const revealCard = document.getElementById('reveal-card');
        const techBg = document.getElementById('tech-bg');
        const canvas = document.getElementById('physics-canvas');
        const ctx = canvas.getContext('2d');

        // Audio System (Using Web Audio API to synthesize hilarious, high-energy victory fanfare!)
        let audioCtx = null;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSynthTone(frequency, type, duration, startTime) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.value = frequency;
            
            gain.gain.setValueAtTime(0.15, startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function playWinMelody() {
            if (!audioCtx) initAudio();
            const now = audioCtx.currentTime;
            
            // Uplifting, dramatic retro arcade win theme!
            playSynthTone(261.63, 'triangle', 0.15, now);       // C4
            playSynthTone(329.63, 'triangle', 0.15, now + 0.15); // E4
            playSynthTone(392.00, 'triangle', 0.15, now + 0.3);  // G4
            playSynthTone(523.25, 'triangle', 0.4, now + 0.45);  // C5
            
            // Layer a sparkly square wave on top of the final note
            playSynthTone(1046.50, 'square', 0.5, now + 0.45); // High C6
        }

        function playPopSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            // Cute bubbles/pop sound
            playSynthTone(400 + Math.random() * 600, 'sine', 0.1, now);
        }

        // Eggplant Physics Engine
        let eggplants = [];
        const emojiSymbol = '🍆';

        class Eggplant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 25 + 25; // Random size
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 6;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 5; // Launch upward slightly
                this.rotation = Math.random() * 360;
                this.vRotation = (Math.random() - 0.5) * 10;
                this.gravity = 0.35;
                this.bounce = 0.75;
                this.opacity = 1;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.vRotation;

                // Bounce off left/right walls
                if (this.x - this.size/2 < 0) {
                    this.x = this.size/2;
                    this.vx *= -this.bounce;
                } else if (this.x + this.size/2 > canvas.width) {
                    this.x = canvas.width - this.size/2;
                    this.vx *= -this.bounce;
                }

                // Bounce off bottom floor
                if (this.y + this.size/2 > canvas.height) {
                    this.y = canvas.height - this.size/2;
                    this.vy *= -this.bounce;
                    // Apply floor friction
                    this.vx *= 0.95;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emojiSymbol, 0, 0);
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function spawnEggplants(x, y, count) {
            for (let i = 0; i < count; i++) {
                eggplants.push(new Eggplant(x, y));
            }
            playPopSound();
        }

        function physicsLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = eggplants.length - 1; i >= 0; i--) {
                const ep = eggplants[i];
                ep.update();
                ep.draw();
                
                // Keep only a reasonable amount of eggplants
                if (eggplants.length > 300) {
                    eggplants.shift();
                }
            }
            requestAnimationFrame(physicsLoop);
        }

        // Trigger Event Handler
        let activePrank = false;

        function triggerPrank(e) {
            if (activePrank) return;
            activePrank = true;

            // Initialize AudioContext instantly on user gesture
            initAudio();
            playWinMelody();

            // Transform Theme & Trigger Shaking Background
            document.body.classList.add('prank-triggered');
            techBg.style.opacity = '0.35';
            techBg.style.backgroundImage = `radial-gradient(#ec4899 1px, transparent 1px)`;

            // Smoothly collapse first card and scale up reveal banner
            scanCard.style.transform = 'scale(0) rotate(-10deg)';
            scanCard.style.opacity = '0';
            
            setTimeout(() => {
                scanCard.classList.add('hidden');
                revealCard.classList.remove('hidden');
                revealCard.style.transform = 'scale(1)';
                
                // Continuous automatic background eggplants for chaotic energy!
                setInterval(() => {
                    const randomX = Math.random() * canvas.width;
                    spawnEggplants(randomX, -50, 5);
                }, 400);

            }, 400);

            // Explode 100 Initial Eggplants from the click center
            const clientX = e.clientX || (e.touches && e.touches[0].clientX) || canvas.width / 2;
            const clientY = e.clientY || (e.touches && e.touches[0].clientY) || canvas.height / 2;
            spawnEggplants(clientX, clientY, 120);

            // Start animation loop
            requestAnimationFrame(physicsLoop);
        }

        // Setup interaction listeners
        triggerBtn.addEventListener('click', triggerPrank);
        triggerBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerPrank(e);
        });

        // Tapping anywhere screen-spams more eggplants after trigger
        window.addEventListener('mousedown', (e) => {
            if (!activePrank) return;
            // Prevent multiple activations
            if (e.target === triggerBtn) return;
            spawnEggplants(e.clientX, e.clientY, 15);
        });

        window.addEventListener('touchstart', (e) => {
            if (!activePrank) return;
            const touch = e.touches[0];
            spawnEggplants(touch.clientX, touch.clientY, 15);
        });

    </script>
</body>
