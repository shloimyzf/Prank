    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(168, 85, 247, 0.4), inset 0 0 15px rgba(168, 85, 247, 0.2);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 40px rgba(168, 85, 247, 0.9), inset 0 0 25px rgba(168, 85, 247, 0.5);
                transform: scale(1.05);
            }
        }
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes rainbow-text {
            0% { color: #ff0055; text-shadow: 0 0 25px #ff0055, 0 0 50px #ff0055; }
            20% { color: #00ffcc; text-shadow: 0 0 25px #00ffcc, 0 0 50px #00ffcc; }
            40% { color: #ffff00; text-shadow: 0 0 25px #ffff00, 0 0 50px #ffff00; }
            60% { color: #ff00ff; text-shadow: 0 0 25px #ff00ff, 0 0 50px #ff00ff; }
            80% { color: #00ff00; text-shadow: 0 0 25px #00ff00, 0 0 50px #00ff00; }
            100% { color: #ff0055; text-shadow: 0 0 25px #ff0055, 0 0 50px #ff0055; }
        }
        @keyframes ultra-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            5% { transform: translate(-12px, 12px) rotate(-3deg); }
            10% { transform: translate(-20px, -15px) rotate(3deg); }
            15% { transform: translate(15px, 20px) rotate(-1deg); }
            20% { transform: translate(20px, -15px) rotate(-3deg); }
            25% { transform: translate(-15px, 15px) rotate(3deg); }
            30% { transform: translate(-25px, 25px) rotate(0deg); }
            35% { transform: translate(25px, 15px) rotate(-3deg); }
            40% { transform: translate(-15px, -25px) rotate(3deg); }
            45% { transform: translate(15px, 15px) rotate(0deg); }
            50% { transform: translate(-12px, 12px) rotate(-3deg); }
            55% { transform: translate(-20px, -15px) rotate(3deg); }
            60% { transform: translate(15px, 20px) rotate(-1deg); }
            65% { transform: translate(20px, -15px) rotate(-3deg); }
            70% { transform: translate(-15px, 15px) rotate(3deg); }
            75% { transform: translate(-25px, 25px) rotate(0deg); }
            80% { transform: translate(25px, 15px) rotate(-3deg); }
            85% { transform: translate(-15px, -25px) rotate(3deg); }
            90% { transform: translate(15px, 15px) rotate(0deg); }
        }
        .pulse-btn {
            animation: pulse-glow 1.5s infinite ease-in-out;
        }
        .scan-element::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #a855f7, transparent);
            animation: scan-line 2.5s infinite linear;
            top: 0;
            left: 0;
        }
        .prank-triggered {
            animation: ultra-shake 0.1s infinite linear !important;
        }
        .rainbow-title {
            animation: rainbow-text 0.5s infinite linear;
        }
    </style>
</head>
<body id="main-body" class="bg-slate-950 text-white min-h-screen flex flex-col justify-between overflow-hidden select-none font-sans relative transition-all duration-75">

    <!-- Ambient High-Tech Particle Grid -->
    <div id="tech-bg" class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(#1e1b4b_1px,transparent_1px)] [background-size:16px_16px]"></div>

    <!-- Physics Canvas for Eggplants -->
    <canvas id="physics-canvas" class="absolute inset-0 pointer-events-none z-40"></canvas>

    <!-- Header Frame -->
    <header class="p-6 flex justify-between items-center z-10 w-full max-w-5xl mx-auto">

    <!-- Main Dynamic Area -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 z-10 relative">
        
        <!-- INTRO SCANNING CARD -->
        <div id="scan-card" class="scan-element bg-slate-900/90 border-2 border-purple-500/40 rounded-2xl p-8 max-w-md w-full text-center backdrop-blur-md relative overflow-hidden transition-all duration-500 shadow-2xl">
            <h1 class="text-2xl font-black tracking-wider text-purple-300 font-mono mb-2">NEURAL SYNC</h1>
            <p class="text-[11px] text-slate-400 font-mono mb-8 uppercase tracking-widest">TAP AND HOLD THE CENTER SENSOR TO SCAN BIO-FIELD</p>
            
            <!-- Beautiful Glowing Center Button -->
            <div class="relative flex justify-center items-center my-10">

                    <svg class="w-12 h-12 text-purple-400 mb-2 animate-bounce" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.042 9.152c.582.448 1.148.89 1.676 1.345m-1.676-1.345c-.58-.447-1.148-.89-1.677-1.345m3.353 2.69c.527.45 1.012.915 1.45 1.397m-1.45-1.397a24.414 24.414 0 00-3.353-2.69m3.353 2.69c-.528-.45-1.013-.915-1.45-1.397m1.45 1.397a24.414 24.414 0 013.353 2.69m-3.353-2.69c.58.447 1.148.89 1.677 1.345m1.676 1.345c-.528-.45-1.013-.915-1.45-1.397m0 0A24.414 24.414 0 0118 10.5m-3.353-2.69h-.008a2.25 2.25 0 00-1.5-.592H8.25A2.25 2.25 0 006 9.5v5a2.25 2.25 0 002.25 2.25h5.5c.613 0 1.18-.245 1.5-.591h.008c.528-.45 1.013-.915 1.45-1.397m-7.25-5.25v6.5"></path>

            </h2>
            <p class="text-white font-black text-2xl md:text-4xl tracking-widest bg-black/90 py-5 px-10 rounded-full border-4 border-pink-500 shadow-[0_0_50px_rgba(236,72,153,0.9)] animate-bounce select-none">

    </main>

    <!-- Footer Frame -->
    <footer class="p-6 flex flex-col sm:flex-row justify-between items-center gap-4 z-10 w-full max-w-5xl mx-auto text-xs font-mono text-slate-600">
        <div>COSMIC SCANNER v11.0-PREMIUM-EARLOAD</div>
        <div>SECURE NEURAL ENVELOPE</div>
    </footer>

    <!-- Interactive JS System -->
    <script>
        // DOM Elements
        const triggerBtn = document.getElementById('trigger-btn');
        const scanCard = document.getElementById('scan-card');
        const revealCard = document.getElementById('reveal-card');
        const techBg = document.getElementById('tech-bg');
        const mainBody = document.getElementById('main-body');
        const canvas = document.getElementById('physics-canvas');
        const ctx = canvas.getContext('2d');

        // Dynamic High-Energy Audio Synthesizer
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 1. Extreme Police Siren (Synthesizes screaming police air horns & sweep sirens)
        function startPoliceSiren() {
            if (!audioCtx) return;
            
            // Channel 1: Primary Screaming Sweeping Siren
            const osc1 = audioCtx.createOscillator();
            const osc1Gain = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(450, audioCtx.currentTime);

            // Frequency sweep (LFO)
            const lfo1 = audioCtx.createOscillator();
            lfo1.frequency.value = 3.5; // Rapid cycles per second
            const lfo1Gain = audioCtx.createGain();
            lfo1Gain.gain.value = 350; // Sweep boundaries (450Hz +/- 350Hz)

            lfo1.connect(lfo1Gain);
            lfo1Gain.connect(osc1.frequency);
            osc1Gain.gain.setValueAtTime(0.4, audioCtx.currentTime);

            osc1.connect(osc1Gain);
            osc1Gain.connect(audioCtx.destination);
            lfo1.start();
            osc1.start();

            // Channel 2: High-Pitch Yelp Alarm Overlay
            const osc2 = audioCtx.createOscillator();
            const osc2Gain = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(900, audioCtx.currentTime);

            const lfo2 = audioCtx.createOscillator();
            lfo2.frequency.value = 6; // Double speed yelp
            const lfo2Gain = audioCtx.createGain();
            lfo2Gain.gain.value = 250;

            lfo2.connect(lfo2Gain);
            lfo2Gain.connect(osc2.frequency);
            osc2Gain.gain.setValueAtTime(0.25, audioCtx.currentTime);

            osc2.connect(osc2Gain);
            osc2Gain.connect(audioCtx.destination);
            lfo2.start();
            osc2.start();
        }

        // 2. Synthesized "Squirting/Squelching" Sound
        // Simulates liquid splatting with a filtered noise burst + a fast sweeping low pitch-drop
        function playSquirtingSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            // Generate physical white noise buffer for the "splat/spray" effect
            const bufferSize = audioCtx.sampleRate * 0.25; // 0.25 seconds of squirt noise
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // Bandpass filter to make the noise sound watery and wet
            const wetFilter = audioCtx.createBiquadFilter();
            wetFilter.type = 'bandpass';
            wetFilter.frequency.setValueAtTime(1200, now);
            wetFilter.frequency.exponentialRampToValueAtTime(180, now + 0.2);
            wetFilter.Q.value = 12;

            // Rapid volume decay
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.8, now); // Super Loud!
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

            noise.connect(wetFilter);
            wetFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start(now);

            // Adding a wet bass pop to mimic the impact squelch
            const popOsc = audioCtx.createOscillator();
            const popGain = audioCtx.createGain();
            popOsc.type = 'sine';
            popOsc.frequency.setValueAtTime(320, now);
            popOsc.frequency.exponentialRampToValueAtTime(30, now + 0.15);

            popGain.gain.setValueAtTime(0.9, now);
            popGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

            popOsc.connect(popGain);
            popGain.connect(audioCtx.destination);
            popOsc.start(now);
            popOsc.stop(now + 0.18);
        }

        // 3. Synthesized Vocal "Moan" Generator
        // Emulates human vocal formants by passing a vibrating low-sawtooth wave through multiple 
        // bandpass filters in parallel at characteristic vowels frequencies, dropping off slowly.
        function playMoaningSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            // Start around 180Hz (average human pitch) and slide smoothly down to a deep groan
            osc.frequency.setValueAtTime(175, now);
            osc.frequency.exponentialRampToValueAtTime(80, now + 0.7);

            // Vocal Formant 1 (Vowel Filter 1 - typical 'ah' to 'oh' spectrum)
            const f1 = audioCtx.createBiquadFilter();
            f1.type = 'bandpass';
            f1.frequency.setValueAtTime(650, now);
            f1.frequency.exponentialRampToValueAtTime(450, now + 0.7);
            f1.Q.value = 8;

            // Vocal Formant 2 (Vowel Filter 2 - adds realism to the vocal tract representation)
            const f2 = audioCtx.createBiquadFilter();
            f2.type = 'bandpass';
            f2.frequency.setValueAtTime(1100, now);
            f2.frequency.exponentialRampToValueAtTime(850, now + 0.7);
            f2.Q.value = 10;

            const outputGain = audioCtx.createGain();
            outputGain.gain.setValueAtTime(1.0, now); // MAX VOLUME MOAN!
            outputGain.gain.exponentialRampToValueAtTime(0.001, now + 0.75);

            // Parallel filter routing
            osc.connect(f1);
            osc.connect(f2);
            
            f1.connect(outputGain);
            f2.connect(outputGain);
            
            outputGain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 0.8);
        }

        // Strobe lighting sync loop
        const strobeColors = [
            'radial-gradient(circle, #ff0055 0%, #000000 100%)',
            'radial-gradient(circle, #00ffcc 0%, #000000 100%)',
            'radial-gradient(circle, #ff00ff 0%, #000000 100%)',
            'radial-gradient(circle, #ffff00 0%, #000000 100%)',
            'radial-gradient(circle, #0033ff 0%, #000000 100%)'
        ];

        function startStrobeSystem() {
            setInterval(() => {
                const randomBg = strobeColors[Math.floor(Math.random() * strobeColors.length)];
                mainBody.style.background = randomBg;
            }, 80);
        }

        // Eggplant Physics System
        let eggplants = [];
        const emojiSymbol = '🍆';

        class Eggplant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 40 + 30; // Extra large
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 18 + 10;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 8; 
                this.rotation = Math.random() * 360;
                this.vRotation = (Math.random() - 0.5) * 20;
                this.gravity = 0.45;
                this.bounce = 0.82;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.vRotation;

                // Bounce off left/right walls
                if (this.x - this.size/2 < 0) {
                    this.x = this.size/2;
                    this.vx *= -this.bounce;
                } else if (this.x + this.size/2 > canvas.width) {
                    this.x = canvas.width - this.size/2;
                    this.vx *= -this.bounce;
                }

                // Bounce off bottom floor
                if (this.y + this.size/2 > canvas.height) {
                    this.y = canvas.height - this.size/2;
                    this.vy *= -this.bounce;
                    this.vx *= 0.96; // drag
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emojiSymbol, 0, 0);
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function spawnEggplants(x, y, count) {
            for (let i = 0; i < count; i++) {
                eggplants.push(new Eggplant(x, y));
            }
        }

        function physicsLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = eggplants.length - 1; i >= 0; i--) {
                const ep = eggplants[i];
                ep.update();
                ep.draw();
                
                if (eggplants.length > 400) {
                    eggplants.shift();
                }
            }
            requestAnimationFrame(physicsLoop);
        }

        // Trigger Event Handler
        let activePrank = false;

        function triggerPrank(e) {
            if (activePrank) return;
            activePrank = true;

            // Instantly activate Web Audio
            initAudio();
            
            // Start sirens + strobes immediately
            startPoliceSiren();
            startStrobeSystem();
            
            // Play initial loud squirt and vocal moan
            playSquirtingSound();
            playMoaningSound();

            // Transform Theme & Trigger Ultra Shaking
            mainBody.classList.add('prank-triggered');
            techBg.style.opacity = '0.5';
            techBg.style.backgroundImage = `radial-gradient(#ec4899 1px, transparent 1px)`;

            // Fast transition of interface
            scanCard.style.transform = 'scale(0) rotate(-30deg)';
            scanCard.style.opacity = '0';
            
            setTimeout(() => {
                scanCard.classList.add('hidden');
                revealCard.classList.remove('hidden');
                revealCard.style.transform = 'scale(1.1)';
                
                // Continuous background auto-spawner for relentless eggplant rain!
                setInterval(() => {
                    const randomX = Math.random() * canvas.width;
                    spawnEggplants(randomX, -50, 8);
                }, 200);

            }, 250);

            // Spawn giant shockwave of initial eggplants
            const clientX = e.clientX || (e.touches && e.touches[0].clientX) || canvas.width / 2;
            const clientY = e.clientY || (e.touches && e.touches[0].clientY) || canvas.height / 2;
            spawnEggplants(clientX, clientY, 180);

            // Execute engine loop
            requestAnimationFrame(physicsLoop);
        }

        // Action binding listeners
        triggerBtn.addEventListener('click', triggerPrank);
        triggerBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerPrank(e);
        });

        // Tapping anywhere triggers louder squirt and moan combination simultaneously!
        window.addEventListener('mousedown', (e) => {
            if (!activePrank) return;
            if (e.target === triggerBtn) return;
            
            playSquirtingSound();
            playMoaningSound();
            spawnEggplants(e.clientX, e.clientY, 25);
        });

        window.addEventListener('touchstart', (e) => {
            if (!activePrank) return;
            const touch = e.touches[0];
            
            playSquirtingSound();
            playMoaningSound();
            spawnEggplants(touch.clientX, touch.clientY, 25);
        });

    </script>
</body>
